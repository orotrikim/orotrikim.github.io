<head>
  <style>
    /* 1. HIDE THE GOOGLE POPUP & TOOLBAR */
    .goog-te-banner-frame.skiptranslate, .goog-te-gadget-simple {
      display: none !important;
    }
    body {
      top: 0px !important;
    }
    /* 2. HIDE THE "ORIGINAL TEXT" TOOLTIP THAT GLITCHES ON HOVER */
    #goog-gt-tt, .goog-te-balloon-frame {
      display: none !important;
    }
    .goog-text-highlight {
      background-color: transparent !important;
      box-shadow: none !important;
      border: none !important;
    }
    /* 3. HIDE THE ACTUAL GOOGLE COMBOBOX */
    #google_translate_element {
      display: none;
    }
  </style>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        // This 'layout' setting helps prevent the glitching toolbar
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
<body>
  <div id="google_translate_element"></div>
  </body>
