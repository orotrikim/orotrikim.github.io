<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3873 Orotrikim</title>

    <style>
      /* Hide the clunky Google Translate top bar and popups */
      .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon {
        display: none !important;
      }
      body {
        top: 0px !important;
      }
      .goog-tooltip {
        display: none !important;
      }
      .goog-tooltip:hover {
        display: none !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      /* Hide the widget itself so it's fully automatic */
      #google_translate_element {
        display: none;
      }
    </style>

    <script type="text/javascript">
      // 1. Function to fetch location and trigger translation
      async function autoTranslateByIP() {
        try {
          // Fetch user location via IP (using ipapi.co)
          const response = await fetch('https://ipapi.co/json/');
          const data = await response.json();
          
          // Map of Country Codes to Language Codes
          const countryToLang = {
            'IL': 'he', // Israel -> Hebrew
            'FR': 'fr', // France -> French
            'ES': 'es', // Spain -> Spanish
            'RU': 'ru', // Russia -> Russian
            'DE': 'de', // Germany -> German
          };

          const targetLang = countryToLang[data.country_code];

          // If target is not English, tell Google to switch
          if (targetLang && targetLang !== 'en') {
            const selectElement = document.querySelector('.goog-te-combo');
            if (selectElement) {
              selectElement.value = targetLang;
              selectElement.dispatchEvent(new Event('change'));
            }
          }
        } catch (error) {
          console.error("Location-based translation failed:", error);
        }
      }

      // 2. Initialize Google Translate
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
        
        // Run the IP check shortly after initialization
        setTimeout(autoTranslateByIP, 1500);
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" crossorigin src="/assets/index-BJXaum5H.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-rFiMLmQu.css">
  </head>

  <body>
    <div id="google_translate_element"></div>

    <div id="root"></div>
  </body>
</html>
